<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-G Ghost</title>
  <style>
    /* ============================================================
   ZERO-G GHOST v6.6 — Newtab UI
   Y2K / Windows 2000 aesthetic — compact launcher
   ============================================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #008080;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 1px,
          rgba(0, 0, 0, 0.04) 1px, rgba(0, 0, 0, 0.04) 2px);
      font-family: Tahoma, Verdana, 'MS UI Gothic', Arial, sans-serif;
      font-size: 11px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── WINDOW ── */
    #app-window {
      width: 480px;
      background: #D4D0C8;
      border: 2px solid;
      border-color: #FFFFFF #404040 #404040 #FFFFFF;
      box-shadow: inset 0 0 0 1px #DFDFDB, 4px 4px 16px rgba(0, 0, 0, 0.5);
    }

    /* ── TITLE BAR ── */
    #title-bar {
      background: linear-gradient(to right, #08177C 0%, #1464D4 55%, #3A8CEE 100%);
      padding: 3px 3px 3px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    #title-icon {
      font-size: 14px;
    }

    #title-text {
      flex: 1;
      color: #FFF;
      font-size: 11px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-btn {
      width: 17px;
      height: 15px;
      background: #D4D0C8;
      border: 1px solid;
      border-color: #FFF #404040 #404040 #FFF;
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #000;
      outline: none;
    }

    .win-btn:hover {
      background: #E8E4DC;
    }

    .win-btn.close {
      background: #C0392B;
      color: #FFF;
      border-color: #FF8888 #800000 #800000 #FF8888;
    }

    .win-btn.close:hover {
      background: #E74C3C;
    }

    /* ── BODY ── */
    #window-body {
      padding: 16px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── LOGO ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid;
      border-image: linear-gradient(to right, #000080, #4090D0, transparent) 1;
    }

    .logo-icon-wrap {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-titles h1 {
      font-size: 15px;
      font-weight: bold;
      color: #000040;
      letter-spacing: 1px;
    }

    .logo-titles .tagline {
      font-size: 10px;
      color: #505070;
      margin-top: 2px;
      font-family: 'Courier New', monospace;
    }

    /* ── ADDRESS BAR ── */
    .addr-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .addr-label {
      font-size: 11px;
      color: #000;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .url-combo {
      flex: 1;
      height: 22px;
      background: #FFF;
      border: 1px solid;
      border-color: #808080 #DFDFDF #DFDFDF #808080;
      box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.1);
    }

    #url-input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      font-size: 11px;
      font-family: Tahoma, Verdana, sans-serif;
      padding: 0 6px;
      background: transparent;
      color: #000;
    }

    #btn-go {
      height: 22px;
      padding: 0 10px;
      background: #D4D0C8;
      border: 1px solid;
      border-color: #FFF #808080 #808080 #FFF;
      cursor: pointer;
      font-size: 11px;
      font-family: Tahoma, Verdana, sans-serif;
      white-space: nowrap;
      outline: none;
      flex-shrink: 0;
    }

    #btn-go:hover {
      background: #E0DCF4;
    }

    #btn-go:active {
      border-color: #808080 #FFF #FFF #808080;
    }

    /* ── QUICK LINKS ── */
    .section-title {
      font-size: 10px;
      color: #606080;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #C0C8E0;
      padding-bottom: 3px;
      margin-bottom: 5px;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ql-btn {
      font-size: 10px;
      color: #000080;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #8090C0;
      padding: 2px 8px;
      cursor: pointer;
      text-decoration: none;
      font-family: Tahoma, Verdana, sans-serif;
    }

    .ql-btn:hover {
      background: #000080;
      color: #FFF;
    }

    /* ── TOOLBAR ROW ── */
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-top: 6px;
      border-top: 1px solid #C0BCBC;
    }

    .tool-btn {
      height: 26px;
      padding: 0 10px;
      background: #D4D0C8;
      border: 1px solid;
      border-color: #FFF #808080 #808080 #FFF;
      cursor: pointer;
      font-size: 11px;
      font-family: Tahoma, Verdana, sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
      outline: none;
      white-space: nowrap;
    }

    .tool-btn:hover {
      background: linear-gradient(to bottom, #EEF4FC, #D8E8F8);
      border-color: #6090C0;
    }

    .tool-btn:active {
      border-color: #808080 #FFF #FFF #808080;
    }

    /* ── STATUS BAR ── */
    #status-bar {
      background: #D4D0C8;
      border-top: 1px solid #DFDFDB;
      padding: 1px 4px;
      display: flex;
      align-items: center;
      height: 18px;
    }

    #status-text {
      flex: 1;
      font-size: 10px;
      color: #000;
      border: 1px solid;
      border-color: #808080 #DFDFDF #DFDFDF #808080;
      padding: 0 5px;
      height: 14px;
      line-height: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: 'Courier New', monospace;
    }

    /* ── CACHE OVERLAY ── */
    #cache-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
    }

    #cache-dialog {
      background: #D4D0C8;
      width: 320px;
      border: 2px solid;
      border-color: #FFF #404040 #404040 #FFF;
      box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.6);
    }

    #cache-dialog-title {
      background: linear-gradient(to right, #08177C, #1464D4 55%, #3A8CEE);
      padding: 3px 6px;
      color: #FFF;
      font-size: 11px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    #cache-dialog-title span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #cache-close-x {
      width: 16px;
      height: 14px;
      background: #D4D0C8;
      border: 1px solid;
      border-color: #FFF #404040 #404040 #FFF;
      font-size: 9px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #cache-close-x:hover {
      background: #C0BCB8;
    }

    #flying-stage {
      position: relative;
      width: 100%;
      height: 56px;
      overflow: hidden;
      background: #EAE6DE;
      border-top: 1px solid #C0BCBC;
      border-bottom: 1px solid #C0BCBC;
    }

    #flying-stage::before,
    #flying-stage::after {
      content: '🗂️';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
    }

    #flying-stage::before {
      left: 10px;
    }

    #flying-stage::after {
      right: 10px;
      content: '🗑️';
      font-size: 26px;
    }

    .paper {
      position: absolute;
      width: 18px;
      height: 22px;
      background: #FFF;
      border: 1px solid #C0BCBC;
      top: 50%;
      transform: translateY(-50%);
      left: -30px;
      box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.15);
      opacity: 0;
    }

    .paper::before {
      content: '';
      display: block;
      margin: 4px 3px 2px;
      height: 2px;
      background: #A0A0A0;
      box-shadow: 0 3px 0 #C0C0C0, 0 6px 0 #C0C0C0, 0 9px 0 #C0C0C0;
    }

    @keyframes flyAcross {
      0% {
        left: 42px;
        opacity: 0;
        transform: translateY(-50%) rotate(-5deg);
      }

      10% {
        opacity: 1;
      }

      85% {
        opacity: 1;
      }

      95% {
        left: calc(100% - 52px);
        transform: translateY(-50%) rotate(8deg);
        opacity: 0.6;
      }

      100% {
        left: calc(100% - 48px);
        opacity: 0;
        transform: translateY(-50%) rotate(15deg) scale(0.7);
      }
    }

    .paper.fly {
      animation: flyAcross 0.9s ease-in-out forwards;
    }

    #cache-dialog-body {
      padding: 12px 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #cache-status-text {
      font-size: 11px;
      color: #202040;
      text-align: center;
      min-height: 16px;
      line-height: 1.5;
    }

    #cache-progress-bar {
      width: 100%;
      height: 13px;
      background: #FFF;
      border: 1px solid;
      border-color: #808080 #DFDFDF #DFDFDF #808080;
      overflow: hidden;
      display: none;
    }

    #cache-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #000080, #0050D0, #0080FF);
      background-size: 200% 100%;
      animation: progressShimmer 0.9s linear infinite;
      transition: width 0.3s ease;
    }

    @keyframes progressShimmer {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    #cache-dialog-btns {
      padding: 0 20px 14px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .cache-btn {
      height: 23px;
      padding: 0 16px;
      background: #D4D0C8;
      border: 1px solid;
      border-color: #FFF #808080 #808080 #FFF;
      cursor: pointer;
      font-size: 11px;
      font-family: Tahoma, Verdana, sans-serif;
      outline: none;
    }

    .cache-btn:hover {
      background: #E0DCCC;
    }

    .cache-btn:disabled {
      color: #A0A0A0;
      cursor: default;
      pointer-events: none;
    }

    .cache-btn.primary {
      background: #000080;
      color: #FFF;
      border-color: #4040C0 #000040 #000040 #4040C0;
    }

    .cache-btn.primary:hover {
      background: #0000A0;
    }

    ::-webkit-scrollbar {
      width: 16px;
    }

    ::-webkit-scrollbar-track {
      background: #D4D0C8;
    }

    ::-webkit-scrollbar-thumb {
      background: #C0BCBC;
      border: 1px solid;
      border-color: #FFF #808080 #808080 #FFF;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #B4B0B0;
    }

    ::selection {
      background: #000080;
      color: #FFF;
    }
  </style>
</head>

<body>

  <div id="app-window">

    <div id="title-bar">
      <div id="title-icon" style="width:18px;height:18px;flex-shrink:0;"><svg xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16" style="width:100%;height:100%;">
          <path
            d="M8,1C4.134,1,1,4.134,1,8v7c1.168,0,1.168-2,2.333-2s1.168,2,2.333,2s1.168-2,2.333-2s1.168,2,2.333,2s1.168-2,2.333-2s1.168,2,2.333,2V8C15,4.134,11.866,1,8,1z M6,8.25c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25s1.25,0.56,1.25,1.25S6.69,8.25,6,8.25z M10,8.25c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25s1.25,0.56,1.25,1.25S10.69,8.25,10,8.25z"
            fill="white" />
        </svg></div>
      <div id="title-text">Zero-G Ghost</div>
      <button class="win-btn" title="最小化">─</button>
      <button class="win-btn" title="最大化">□</button>
      <button class="win-btn close" title="閉じる">✕</button>
    </div>

    <div id="window-body">

      <div class="logo-row">
        <div class="logo-icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
            style="width:100%;height:100%;">
            <path
              d="M8,1C4.134,1,1,4.134,1,8v7c1.168,0,1.168-2,2.333-2s1.168,2,2.333,2s1.168-2,2.333-2s1.168,2,2.333,2s1.168-2,2.333-2s1.168,2,2.333,2V8C15,4.134,11.866,1,8,1z M6,8.25c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25s1.25,0.56,1.25,1.25S6.69,8.25,6,8.25z M10,8.25c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25s1.25,0.56,1.25,1.25S10.69,8.25,10,8.25z"
              fill="#000040" />
          </svg></div>
        <div class="logo-titles">
          <h1>Zero-G Ghost</h1>
          <div class="tagline">PERFORMANCE &amp; CACHE UTILITY — v6.5</div>
        </div>
      </div>

      <div class="addr-row">
        <span class="addr-label">Open:</span>
        <div class="url-combo">
          <input type="text" id="url-input" placeholder="URL or search…" spellcheck="false" autocomplete="off" />
        </div>
        <button id="btn-go">Go ▶</button>
      </div>

      <div>
        <div class="section-title">Quick Links</div>
        <div class="quick-links">
          <a class="ql-btn" href="#" data-url="https://web.archive.org">📦 Wayback Machine</a>
          <a class="ql-btn" href="#" data-url="https://info.cern.ch">🔬 CERN</a>
          <a class="ql-btn" href="#" data-url="https://example.com">🌐 Example.com</a>
          <a class="ql-btn" href="#" data-url="https://qootheskywalker.github.io/Zero-G-Ghost">📖 User
            Guide</a>
          <a class="ql-btn" href="#" data-url="https://github.com/QOOtheSKYWALKER/Zero-G-Ghost">🛠️ GitHub</a>
        </div>
      </div>

      <div class="toolbar-row">
        <button class="tool-btn" id="btn-cache"><span>🗑️</span><span>Clear Cache</span></button>
      </div>

    </div>

    <div id="status-bar">
      <div id="status-text">Ready</div>
    </div>

  </div>

  <div id="cache-overlay">
    <div id="cache-dialog">
      <div id="cache-dialog-title">
        <span>🗑️ Clearing Cache…</span>
        <button id="cache-close-x">X</button>
      </div>
      <div id="flying-stage" aria-hidden="true"></div>
      <div id="cache-dialog-body">
        <div id="cache-status-text">Clears cache, IndexedDB, and service workers. Cookies are preserved.</div>
        <div id="cache-progress-bar">
          <div id="cache-progress-fill"></div>
        </div>
      </div>
      <div id="cache-dialog-btns">
        <button class="cache-btn primary" id="cache-start-btn">Clear Now</button>
        <button class="cache-btn" id="cache-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>

</html>
